<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 36 Quiz 1</title>

    <style>
        /* --- CSS Variables & Themes --- */
        :root {
            --transition-speed: 0.3s;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            /* Default Feedback Colors (Fallback for custom themes) */
            --feedback-success-bg: #064e3b;
            --feedback-success-border: #059669;
            --feedback-success-text: #a7f3d0;
            --feedback-error-bg: #7f1d1d;
            --feedback-error-border: #dc2626;
            --feedback-error-text: #fecaca;
        }[data-theme="dark"] {
            --bg-body: #1e293b; --bg-card: #334155; --bg-header: #0f172a;
            --text-main: #f1f5f9; --text-muted: #94a3b8; --text-accent: #38bdf8;
            --border-color: #475569; --highlight-bg: #475569;
            --button-bg: #38bdf8; --button-text: #0f172a; --button-hover: #0ea5e9;
        }

        [data-theme="light"] {
            --bg-body: #f3f4f6; --bg-card: #ffffff; --bg-header: #ffffff;
            --text-main: #1f2937; --text-muted: #6b7280; --text-accent: #2563eb;
            --border-color: #e5e7eb; --highlight-bg: #f3f4f6;
            --button-bg: #2563eb; --button-text: #ffffff; --button-hover: #1d4ed8;
            --feedback-success-bg: #ecfdf5; --feedback-success-border: #34d399; --feedback-success-text: #065f46;
            --feedback-error-bg: #fef2f2; --feedback-error-border: #f87171; --feedback-error-text: #991b1b;
        }

        [data-theme="midnight"] {
            --bg-body: #000000; --bg-card: #000000; --bg-header: #000000;
            --text-main: #e0e0e0; --text-muted: #888888; --text-accent: #90caf9;
            --border-color: #333333; --highlight-bg: #1a1a1a;
            --button-bg: #90caf9; --button-text: #000000; --button-hover: #42a5f5;
            --feedback-success-bg: #051b11; --feedback-success-border: #0f5132; --feedback-success-text: #75b798;
            --feedback-error-bg: #2c0b0e; --feedback-error-border: #842029; --feedback-error-text: #ea868f;
        }[data-theme="legacy-dark"] {
            --bg-body: #2d343e; --bg-card: #3c424f; --bg-header: #3c424f;
            --text-main: #e8e6e3; --text-muted: #b0c4de; --text-accent: #8ab4f8;
            --border-color: #555; --highlight-bg: #454c5a;
            --button-bg: #8ab4f8; --button-text: #202124; --button-hover: #a3c5f9;
            --feedback-success-bg: #344e41; --feedback-success-border: #52b788; --feedback-success-text: #c7f9cc;
            --feedback-error-bg: #5e2129; --feedback-error-border: #a4133c; --feedback-error-text: #f8d7da;
        }

        [data-theme="sepia"] {
            --bg-body: #f4ecd8; --bg-card: #fdf6e3; --bg-header: #e4d5b7;
            --text-main: #433422; --text-muted: #7c6f5a; --text-accent: #a05a2c;
            --border-color: #d3c4a5; --highlight-bg: #ebe1c9;
            --button-bg: #a05a2c; --button-text: #fdf6e3; --button-hover: #864822;
            --feedback-success-bg: #e6f4ea; --feedback-success-border: #8ab893; --feedback-success-text: #2e4c35;
            --feedback-error-bg: #f9e3e3; --feedback-error-border: #d48f8f; --feedback-error-text: #5c2b2b;
        }[data-theme="contrast"] {
            --bg-body: #000000; --bg-card: #000000; --bg-header: #000000;
            --text-main: #ffffff; --text-muted: #dddddd; --text-accent: #ffff00;
            --border-color: #ffffff; --highlight-bg: #333333;
            --button-bg: #ffff00; --button-text: #000000; --button-hover: #e6e600;
            --feedback-success-bg: #000000; --feedback-success-border: #00ff00; --feedback-success-text: #00ff00;
            --feedback-error-bg: #000000; --feedback-error-border: #ff0000; --feedback-error-text: #ff0000;
        }

        /* --- Global Reset & Layout --- */
        * { box-sizing: border-box; }
        
        body {
            font-family: var(--font-main);
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            line-height: 1.6;
        }

        /* --- Header --- */
        header {
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        header.unpinned { position: relative; box-shadow: none; }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; flex-wrap: wrap; gap: 15px;
        }

        header h1 { font-size: 1.5rem; margin: 0; color: var(--text-accent); font-weight: 700; }

        .controls-wrapper { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        /* --- Custom Theme Builder --- */
        .custom-builder {
            display: none; flex-wrap: wrap; gap: 15px;
            background-color: var(--bg-card); padding: 10px 15px;
            border-radius: 8px; border: 1px solid var(--border-color);
            margin-top: 5px; font-size: 0.85rem; animation: fadeIn 0.3s;
            width: 100%; justify-content: flex-end;
        }
        .custom-builder.active { display: flex; }
        .color-picker-group { display: flex; align-items: center; gap: 8px; }
        .color-picker-group input[type="color"] {
            border: none; width: 25px; height: 25px; border-radius: 4px;
            cursor: pointer; padding: 0; background: none;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Controls --- */
        .header-btn {
            background-color: var(--highlight-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-btn:hover {
            border-color: var(--text-accent);
            color: var(--text-accent);
        }

        .pin-btn {
            background: none; border: 1px solid var(--border-color); color: var(--text-main);
            cursor: pointer; padding: 0 10px; border-radius: 6px; font-size: 1rem;
            transition: background-color 0.2s; height: 34px; display: flex;
            align-items: center; justify-content: center;
        }
        .pin-btn:hover { background-color: var(--highlight-bg); }
        .pin-btn.pin-active { background-color: rgba(0, 0, 0, 0.1); }

        select#theme-select {
            padding: 0 12px; border-radius: 6px; border: 1px solid var(--border-color);
            background-color: var(--bg-card); color: var(--text-main);
            cursor: pointer; font-family: inherit; height: 34px;
        }

        /* --- Section Navigation --- */
        .section-nav { display: flex; gap: 10px; flex-wrap: wrap; }
        .section-nav button {
            background-color: var(--highlight-bg); color: var(--text-main);
            border: 1px solid var(--border-color); padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.85rem;
            font-weight: 500; transition: all 0.2s;
        }
        .section-nav button:hover { border-color: var(--text-accent); color: var(--text-accent); }

        /* --- Main Content --- */
        .container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 0 1rem 4rem 1rem;
        }

        .section-header {
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--text-accent);
            color: var(--text-accent);
            font-size: 1.5rem;
            font-weight: 700;
            scroll-margin-top: 150px; /* Offset for sticky header */
        }

        /* --- Question Card --- */
        .question-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .lo-box {
            background-color: var(--highlight-bg);
            border-left: 4px solid var(--text-accent);
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
            display: none; /* Hidden by default */
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        /* --- Options --- */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover {
            background-color: var(--highlight-bg);
            border-color: var(--text-muted);
        }

        .option-label input {
            margin-top: 0.3rem;
            margin-right: 1rem;
            accent-color: var(--text-accent);
            transform: scale(1.2);
        }

        /* --- Buttons --- */
        .btn-check {
            margin-top: 1.5rem;
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .btn-check:hover {
            opacity: 0.9;
        }

        .btn-link {
            display: inline-block;
            background-color: var(--button-bg);
            color: var(--button-text);
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .btn-link:hover {
            opacity: 0.9;
        }

        /* --- Feedback Area --- */
        .feedback {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            display: none; /* Hidden by default */
            border: 1px solid transparent;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.correct {
            background-color: var(--feedback-success-bg);
            border-color: var(--feedback-success-border);
            color: var(--feedback-success-text);
        }

        .feedback.incorrect {
            background-color: var(--feedback-error-bg);
            border-color: var(--feedback-error-border);
            color: var(--feedback-error-text);
        }

        .feedback-header {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .rationale {
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        .source {
            display: block;
            margin-top: 1rem;
            font-size: 0.85rem;
            opacity: 0.8;
            font-style: italic;
            border-top: 1px dashed currentColor;
            padding-top: 0.5rem;
        }

        /* --- Mobile Tweaks --- */
        @media (max-width: 768px) {
            .header-top { flex-direction: column; align-items: flex-start; }
            .controls-wrapper { width: 100%; justify-content: flex-start; }
            .section-nav { justify-content: flex-start; }
            .custom-builder { justify-content: flex-start; }
            header h1 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-top">
            <h1>Week 36 Quiz 1</h1>
            <div class="controls-wrapper">
                
                <!-- Reveal LOs Button -->
                <button id="reveal-all-btn" class="header-btn" onclick="toggleAllLOs()">Show Learning Objectives</button>
                
                <!-- Pin Button -->
                <button class="pin-btn pin-active" id="pin-btn" onclick="toggleHeader()" title="Pin/Unpin Header">📌</button>
                
                <!-- Theme Selector -->
                <div class="theme-control">
                    <select id="theme-select" onchange="changeTheme(this.value)">
                        <option value="dark">Modern Dark</option>
                        <option value="midnight">Midnight</option>
                        <option value="light">Modern Light</option>
                        <option value="legacy-dark">Legacy Dark</option>
                        <option value="sepia">Sepia</option>
                        <option value="contrast">High Contrast</option>
                        <option value="custom">⚙️ Custom...</option>
                    </select>
                </div>
            </div>
            
            <!-- Custom Theme Color Pickers -->
            <div class="custom-builder" id="custom-builder">
                <div class="color-picker-group">
                    <label>Background:</label>
                    <input type="color" id="color-bg" value="#1a1a2e" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Cards:</label>
                    <input type="color" id="color-card" value="#16213e" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Text:</label>
                    <input type="color" id="color-text" value="#e94560" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Accent:</label>
                    <input type="color" id="color-accent" value="#0f3460" oninput="updateCustomTheme()">
                </div>
            </div>
        </div>
        
        <!-- Dynamic Navigation Bar -->
        <div class="section-nav" id="section-nav"></div>
    </header>

    <div class="container">
        <div id="quiz-root">
            <!-- Content injected via JS -->
        </div>
    </div>

    <script>
        // --- Data ---
        const quizData =[
            // --- Section 1: Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx ---
            {
                section: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx",
                fullLO: "LO1: Describe the anatomy of the tongue, including surface features, extrinsic and intrinsic musculature, vascular supply, lymphatic drainage, and innervation (motor and sensory). Discuss clinical manifestations of nerve lesions that affect the tongue.",
                question: "A 24-year-old man is brought to the emergency department after a traumatic injury results in a fractured mandible. During the physical examination, the physician asks the patient to protrude his tongue, and it noticeably deviates to the right side. The physician suspects a nerve injury leading to paralysis and eventual atrophy of one side of the tongue. Which of the following nerves was most likely injured by the trauma?",
                options: {
                    A: "Left glossopharyngeal nerve",
                    B: "Left hypoglossal nerve",
                    C: "Right facial nerve",
                    D: "Right glossopharyngeal nerve",
                    E: "Right hypoglossal nerve"
                },
                correctAnswer: "E",
                rationale: "The hypoglossal nerve (CN XII) innervates the extrinsic and intrinsic muscles of the tongue. Trauma, such as a fractured mandible, may injure this nerve. When protruded, the tongue deviates to the paralyzed side (the side of the lesion) because of the action of the unaffected functional contralateral muscles (specifically, the genioglossus).",
                source: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx PDF, page 85: \"Clinical Note: Trauma, such as a fractured mandible, may injure the hypoglossal nerve (CN XII), resulting in paralysis and eventual atrophy of one side of the tongue. The tongue deviates to the paralyzed side during protrusion because of the action of the unaffected genioglossus on the other side.\""
            },
            {
                section: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx",
                fullLO: "LO1: Describe the anatomy of the tongue, including surface features, extrinsic and intrinsic musculature, vascular supply, lymphatic drainage, and innervation (motor and sensory). Discuss clinical manifestations of nerve lesions that affect the tongue.",
                question: "A 45-year-old woman presents to the clinic with complaints of altered sensation in her mouth. Neurological examination reveals that general sensation (touch and temperature) is fully intact over the anterior two-thirds of her tongue. However, she has a complete loss of special sensation (taste) on the anterior two-thirds of her tongue. Which of the following nerves is most likely injured?",
                options: {
                    A: "Chorda tympani nerve",
                    B: "Glossopharyngeal nerve",
                    C: "Hypoglossal nerve",
                    D: "Lingual nerve",
                    E: "Vagus nerve"
                },
                correctAnswer: "A",
                rationale: "Special sensation (taste) to the anterior 2/3 of the tongue is provided by the chorda tympani nerve (a branch of CN VII), which travels via the lingual nerve. General sensation to this area is provided by the lingual nerve itself (a branch of CN V3). Since general sensation is intact, the lingual nerve is functioning, but the chorda tympani fibers have been compromised.",
                source: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx PDF, page 86: \"Anterior 2/3 of the tongue: a. General sensation (touch & temperature): lingual nerve (branch of CN V3) b. Special sensation (taste): chorda tympani nerve (branch of CN VII)\""
            },
            {
                section: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx",
                fullLO: "LO2: Describe the muscles of mastication, including their function and innervation.",
                question: "A 35-year-old man is evaluated for weakness in his muscles of mastication following a nerve injury. The physician notes significant weakness specifically when the patient attempts to depress and protract his mandible. Which of the following muscles is primarily responsible for these combined actions?",
                options: {
                    A: "Buccinator",
                    B: "Lateral pterygoid",
                    C: "Masseter",
                    D: "Medial pterygoid",
                    E: "Temporalis"
                },
                correctAnswer: "B",
                rationale: "The lateral pterygoid muscle acts to depress (superior head), elevate (inferior head), and protract (both heads) the mandible. Other muscles of mastication like the temporalis, masseter, and medial pterygoid primarily act to elevate and/or retract the mandible.",
                source: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx PDF, slide 21: \"Lateral pterygoid muscle... Actions: Depression (superior head), elevation (inferior head), protraction (both heads)\""
            },
            {
                section: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx",
                fullLO: "LO2: Describe the muscles of mastication, including their function and innervation.",
                question: "A 28-year-old woman is unable to forcefully elevate or retract her mandible. Electromyography confirms a deficit isolated to the temporalis muscle. Which of the following nerves provides the direct motor innervation to this specific muscle?",
                options: {
                    A: "Facial nerve",
                    B: "Glossopharyngeal nerve",
                    C: "Hypoglossal nerve",
                    D: "Mandibular nerve",
                    E: "Vagus nerve"
                },
                correctAnswer: "D",
                rationale: "All primary muscles of mastication, including the temporalis muscle, are innervated by the mandibular division of the trigeminal nerve (CN V3).",
                source: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx PDF, slide 19: \"Muscles of Mastication... Primary... Temporalis muscle... All innervated by mandibular nerve (CN V3)\""
            },
            {
                section: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx",
                fullLO: "LO3: Describe the structure, function, neurovascular supply, and musculature associated with the hard and soft palates.",
                question: "A surgeon is preparing to repair a defect in the anterior part of a patient's hard palate. To achieve adequate local anesthesia of the sensory innervation of the anterior part of the hard palate, the surgeon intends to perform a nerve block at the incisive foramen. Which of the following nerves enters the palate through this specific opening?",
                options: {
                    A: "Greater palatine nerve",
                    B: "Lesser palatine nerve",
                    C: "Lingual nerve",
                    D: "Nasopalatine nerve",
                    E: "Pharyngeal nerve"
                },
                correctAnswer: "D",
                rationale: "The nasopalatine nerve provides sensory innervation to the anterior part of the hard palate. It enters the palate by passing through the incisive foramen, which is located posterior to the incisor teeth.",
                source: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx PDF, page 82: \"Nasopalatine nerve – sensory innervation of the anterior part of the hard palate; enters the palate through the incisive foramen\""
            },
            {
                section: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx",
                fullLO: "LO3: Describe the structure, function, neurovascular supply, and musculature associated with the hard and soft palates.",
                question: "A patient is undergoing an evaluation of swallowing mechanics. During swallowing and yawning, a specific muscle acts to elevate the soft palate, thereby preventing food from entering the nasal cavities. Which of the following muscles is responsible for this elevation?",
                options: {
                    A: "Levator veli palatini",
                    B: "Musculus uvulae",
                    C: "Palatoglossus",
                    D: "Palatopharyngeus",
                    E: "Tensor veli palatini"
                },
                correctAnswer: "A",
                rationale: "The levator veli palatini muscle functions to elevate the soft palate during swallowing and yawning.",
                source: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx PDF, slide 55: \"Levator veli palatini muscle... Elevates soft palate during swallowing and yawning\""
            },
            {
                section: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx",
                fullLO: "LO4: Describe the major salivary glands, including their location, ducts, and innervation.",
                question: "A 45-year-old man presents with swelling on the side of his face. The physician determines that the duct of the largest of the three paired salivary glands is blocked. This duct normally crosses the masseter muscle and pierces the buccinator muscle. Into which specific area of the oral cavity does this duct normally empty?",
                options: {
                    A: "At the base of the lingual frenulum",
                    B: "At the sublingual caruncle",
                    C: "Near the first mandibular premolar",
                    D: "Near the second maxillary molar",
                    E: "On the floor of the mouth via multiple minor ducts"
                },
                correctAnswer: "D",
                rationale: "The parotid gland is the largest salivary gland. Its duct (Stenson's duct) crosses the masseter, pierces the buccinator, and empties into the oral cavity near the 2nd maxillary molar.",
                source: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx PDF, slide 39: \"Parotid Gland... Largest of the three paired salivary glands... Drains via parotid (Stenson’s) duct... Empties into oral cavity near 2nd maxillary molar\""
            },
            {
                section: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx",
                fullLO: "LO4: Describe the major salivary glands, including their location, ducts, and innervation.",
                question: "A 55-year-old woman is evaluated for a decrease in the secretions of her salivary glands. Testing indicates a failure of pre-ganglionic parasympathetic secretomotor fibers to stimulate the submandibular ganglion. These pre-ganglionic fibers originate in which of the following cranial nerves?",
                options: {
                    A: "Facial nerve (CN VII)",
                    B: "Glossopharyngeal nerve (CN IX)",
                    C: "Hypoglossal nerve (CN XII)",
                    D: "Trigeminal nerve (CN V)",
                    E: "Vagus nerve (CN X)"
                },
                correctAnswer: "A",
                rationale: "Parasympathetic secretomotor innervation to the submandibular (and sublingual) glands involves pre-ganglionic fibers that originate in the facial nerve (CN VII) and synapse in the submandibular ganglion.",
                source: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx PDF, slide 44: \"Parasympathetic Innervation of Submandibular and Sublingual Glands... Pre-ganglionic fibers... Originate in facial nerve (CN VII)\""
            },
            {
                section: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx",
                fullLO: "LO5: Describe the musculature, function, and innervation of the pharynx.",
                question: "During an anatomical dissection of the pharynx, a medical student is instructed to locate the outer circular layer of musculature. The student identifies the most inferior muscle in this group, noting its attachments to the thyroid cartilage and the cricoid cartilage. Which of the following muscles is the student observing?",
                options: {
                    A: "Inferior pharyngeal constrictor",
                    B: "Middle pharyngeal constrictor",
                    C: "Palatopharyngeus",
                    D: "Salpingopharyngeus",
                    E: "Superior pharyngeal constrictor"
                },
                correctAnswer: "A",
                rationale: "The pharyngeal constrictor muscles form the outer circular layer of the pharynx. The inferior pharyngeal constrictor specifically attaches to the thyroid cartilage and the cricoid cartilage.",
                source: "Upper GI Tract Anatomy: Oral Cavity, Palate, and Pharynx PDF, slide 68: \"Pharyngeal Constrictor Muscles... Inferior... Attaches to thyroid cartilage and cricoid cartilage\""
            },
            {

        // --- Core Logic ---
        const quizRoot = document.getElementById('quiz-root');
        const themeSelect = document.getElementById('theme-select');
        const pinBtn = document.getElementById('pin-btn');
        const mainHeader = document.getElementById('main-header');
        const sectionNav = document.getElementById('section-nav');
        const customBuilder = document.getElementById('custom-builder');
        const rootElements = document.documentElement;

        let isRevealed = false;

        function toggleAllLOs() {
            isRevealed = !isRevealed;
            const btn = document.getElementById('reveal-all-btn');
            btn.textContent = isRevealed ? "Hide Learning Objectives" : "Show Learning Objectives";
            
            document.querySelectorAll('.lo-box').forEach(box => {
                box.style.display = isRevealed ? 'block' : 'none';
            });
        }

        function initQuiz() {
            let currentSection = "";
            let sectionIndex = 0;
            
            quizData.forEach((item, index) => {
                if (item.section !== currentSection) {
                    currentSection = item.section;
                    
                    const sectionId = 'sec-' + sectionIndex;
                    
                    const sectionHeader = document.createElement('h2');
                    sectionHeader.className = 'section-header';
                    sectionHeader.id = sectionId;
                    sectionHeader.textContent = currentSection;
                    quizRoot.appendChild(sectionHeader);

                    const navBtn = document.createElement('button');
                    let btnText = currentSection;
                    if (btnText.includes("Upper GI Tract Anatomy")) btnText = "Upper GI Anatomy";
                    if (btnText.includes("Anterior Abdominal Wall")) btnText = "Abdominal Wall";
                    if (btnText.includes("Upper GI Histology")) btnText = "Upper GI Histology";
                    
                    navBtn.textContent = btnText;
                    navBtn.onclick = () => {
                        document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth' });
                    };
                    sectionNav.appendChild(navBtn);

                    sectionIndex++;
                }

                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-card-${index}`;

                const loBox = document.createElement('div');
                loBox.className = 'lo-box';
                loBox.id = `lo-${index}`;
                loBox.innerHTML = item.fullLO;
                card.appendChild(loBox);

                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerHTML = `${index + 1}. ${item.question}`;
                card.appendChild(qText);

                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';

                for (const[key, value] of Object.entries(item.options)) {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    
                    const input = document.createElement('input');
                    input.type = 'radio';
                    input.name = `question-${index}`;
                    input.value = key;

                    const span = document.createElement('span');
                    span.innerHTML = `${key}. ${value}`;

                    label.appendChild(input);
                    label.appendChild(span);
                    optionsGrid.appendChild(label);
                }
                card.appendChild(optionsGrid);

                const btn = document.createElement('button');
                btn.className = 'btn-check';
                btn.textContent = 'Check Answer';
                btn.onclick = () => checkAnswer(index);
                card.appendChild(btn);

                const feedback = document.createElement('div');
                feedback.className = 'feedback';
                feedback.id = `feedback-${index}`;
                card.appendChild(feedback);

                quizRoot.appendChild(card);
            });

            const returnContainer = document.createElement('div');
            returnContainer.style.textAlign = 'center';
            returnContainer.style.marginTop = '2rem';
            
            const returnBtn = document.createElement('a');
            returnBtn.href = 'https://ibecerramcg.github.io/GI-GU-ENDO-Practice-Quizzes/';
            returnBtn.className = 'btn-link';
            returnBtn.textContent = '← Return to Quiz Directory';
            
            returnContainer.appendChild(returnBtn);
            quizRoot.appendChild(returnContainer);

            const savedTheme = localStorage.getItem('quizTheme') || 'dark';
            themeSelect.value = savedTheme;
            changeTheme(savedTheme);

            const savedPinState = localStorage.getItem('headerPinned');
            toggleHeader(savedPinState !== 'false');
        }

        function checkAnswer(index) {
            const selected = document.querySelector(`input[name="question-${index}"]:checked`);
            const feedbackEl = document.getElementById(`feedback-${index}`);
            const data = quizData[index];

            if (!selected) {
                alert("Please select an answer.");
                return;
            }

            const isCorrect = selected.value === data.correctAnswer;
            
            let html = `<span class="feedback-header">${isCorrect ? "Correct!" : "Incorrect"}</span>`;
            if (!isCorrect) {
                html += `<div>The correct answer is <strong>${data.correctAnswer}</strong>.</div>`;
            }
            
            html += `<div class="rationale"><strong>Rationale:</strong> ${data.rationale}</div>`;
            html += `<div class="source"><strong>Source:</strong> ${data.source}</div>`;

            feedbackEl.innerHTML = html;
            feedbackEl.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            feedbackEl.style.display = 'block';
        }

        function changeTheme(themeName) {
            localStorage.setItem('quizTheme', themeName);
            
            if (themeName === 'custom') {
                rootElements.removeAttribute('data-theme');
                customBuilder.classList.add('active');
                loadCustomTheme();
            } else {
                rootElements.setAttribute('data-theme', themeName);
                customBuilder.classList.remove('active');
                rootElements.removeAttribute('style');
            }
        }

        function updateCustomTheme() {
            const bg = document.getElementById('color-bg').value;
            const card = document.getElementById('color-card').value;
            const text = document.getElementById('color-text').value;
            const accent = document.getElementById('color-accent').value;

            rootElements.style.setProperty('--bg-body', bg);
            rootElements.style.setProperty('--bg-header', bg);
            rootElements.style.setProperty('--bg-card', card);
            rootElements.style.setProperty('--highlight-bg', card);
            rootElements.style.setProperty('--text-main', text);
            rootElements.style.setProperty('--text-accent', accent);
            rootElements.style.setProperty('--button-bg', accent);
            rootElements.style.setProperty('--button-text', bg);
            rootElements.style.setProperty('--border-color', accent + '40');

            const customColors = { bg, card, text, accent };
            localStorage.setItem('customThemeColors', JSON.stringify(customColors));
        }

        function loadCustomTheme() {
            const savedColors = JSON.parse(localStorage.getItem('customThemeColors'));
            if (savedColors) {
                document.getElementById('color-bg').value = savedColors.bg;
                document.getElementById('color-card').value = savedColors.card;
                document.getElementById('color-text').value = savedColors.text;
                document.getElementById('color-accent').value = savedColors.accent;
                updateCustomTheme();
            } else {
                updateCustomTheme();
            }
        }

        function toggleHeader(forceState) {
            const isCurrentlyPinned = !mainHeader.classList.contains('unpinned');
            const newState = (typeof forceState === 'boolean') ? forceState : !isCurrentlyPinned;

            if (newState) {
                mainHeader.classList.remove('unpinned');
                pinBtn.classList.add('pin-active');
                localStorage.setItem('headerPinned', 'true');
            } else {
                mainHeader.classList.add('unpinned');
                pinBtn.classList.remove('pin-active');
                localStorage.setItem('headerPinned', 'false');
            }
        }

        document.addEventListener('DOMContentLoaded', initQuiz);

    </script>
